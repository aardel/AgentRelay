node_name: my-computer
port: 9876
token: GENERATE_WITH_agentrelay_--init

use_tmux: false
approve_timeout: 300
default_action: approve
default_agent: claude

relay:
  wait_before_send_seconds: 5

trusted_peers: []

# Optional: semantic memory sidecar (https://github.com/rohitg00/agentmemory)
# agentmemory:
#   enabled: false
#   url: http://127.0.0.1:3111
#   project: agentrelay
#   token_budget: 1500
#   inject_on_launch: true
#   observe_on_close: true

adapters:
  claude:
    label: Claude
    role: reasoning
    capabilities: [planning, synthesis, review]
    command: ["claude", "-p", "{prompt}"]
    timeout: 1800
  codex:
    label: Codex
    role: execution
    capabilities: [code_edit, tests, debugging]
    command: ["codex", "exec", "--skip-git-repo-check", "{prompt}"]
    timeout: 1800
  codex-visible:
    label: Codex (visible window)
    mode: interactive
    role: execution
    capabilities: [code_edit, tests, debugging]
    session: agentrelay-codex
    command: ["codex"]
    timeout: 1800
  gemini:
    label: Gemini
    role: reasoning
    capabilities: [planning, research, synthesis]
    command: ["gemini", "-p", "{prompt}"]
    timeout: 1800

rules:
  - pattern: '\b(sudo|rm\s+-rf|/etc/|\.ssh|systemctl|launchctl|shutdown|reboot)\b'
    action: approve
    agent: claude
  - pattern: '^(uname|hostname|whoami|pwd|ls|df|free|uptime|date|id)(\s|$)'
    action: auto
  - pattern: '\b(apt|brew|npm|pip|pipx|cargo|docker|git)\b'
    action: agent
    agent: claude
